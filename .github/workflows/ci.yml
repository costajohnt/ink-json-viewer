name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit
      # xo's bundled eslint-plugin-ava needs Node >= 20.11 (import.meta.filename);
      # run lint only on the Node 22 matrix entry to keep it reliable.
      - run: npm run lint
        if: matrix.node-version == 22
      - run: npm test
