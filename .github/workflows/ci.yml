name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
        ink-version: [6]
        include:
          # Compatibility leg: verify the advertised `ink >=6` peer range
          # against the current ink major.
          - node-version: 22
            ink-version: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm install --no-save ink@^7
        if: matrix.ink-version == 7
      - run: npm run build
      - run: npx tsc --noEmit
      # xo's bundled eslint-plugin-ava needs Node >= 20.11 (import.meta.filename);
      # run lint only on the Node 22 matrix entry to keep it reliable.
      - run: npm run lint
        if: matrix.node-version == 22
      - run: npm test
